name: Bootstrap focused infrastructure cut

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/materialize-focused-cut.yml
  pull_request:
    branches:
      - main
    paths:
      - .bootstrap/READY
  workflow_dispatch:

permissions:
  contents: write

env:
  TARGET_BRANCH: refactor/remove-embedded-infrastructure
  SOURCE_COMMIT: c4338b0b96de62d2c673f80ad744d3297687da07
  CUT_COMMIT: a32bc5a855f0ddad8095163ef22cb2d8e8a83a8b

jobs:
  materialize:
    name: Materialize focused source commit
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    steps:
      - name: Checkout target transport branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Reconstruct and hash-check cut bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/bundle-* | base64 --decode > /tmp/lean-cut.bundle.gz
          echo "f900a6f44e38ed73f4f5e034bee4ccd4a5f96c3e879dbfaa7c85249594aade15  /tmp/lean-cut.bundle.gz" | sha256sum --check --strict
          gunzip /tmp/lean-cut.bundle.gz

      - name: Rebuild from original repository history
        shell: bash
        run: |
          set -euo pipefail
          git clone --no-checkout https://gitlab.com/hectorb.yx/quetzalcoatl.git /tmp/quetzalcoatl-source
          git -C /tmp/quetzalcoatl-source checkout --detach "$SOURCE_COMMIT"
          git -C /tmp/quetzalcoatl-source bundle verify /tmp/lean-cut.bundle
          git -C /tmp/quetzalcoatl-source fetch /tmp/lean-cut.bundle HEAD:refs/remotes/bundle/lean-cut
          git -C /tmp/quetzalcoatl-source checkout --detach "$CUT_COMMIT"
          test "$(git -C /tmp/quetzalcoatl-source rev-parse HEAD)" = "$CUT_COMMIT"

      - name: Replace transport with focused source tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a --exclude='.git/' /tmp/quetzalcoatl-source/ ./
          python3 ci/validate_cut.py
          find runtime/payload-v1/bin -maxdepth 1 -type f -print0 | xargs -0 -r -n1 sh -n

      - name: Commit materialized source tree
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "refactor: remove embedded infrastructure provisioning"
          git push origin HEAD:"$TARGET_BRANCH"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  linux:
    name: Linux · Rust and runtime contracts
    needs: materialize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout materialized commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.materialize.outputs.commit_sha }}
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Validate cut contract
        run: python3 ci/validate_cut.py
      - name: Check shell payloads
        shell: bash
        run: |
          set -euo pipefail
          find runtime/payload-v1/bin -maxdepth 1 -type f -print0 | xargs -0 -r -n1 sh -n
          shellcheck runtime/payload-v1/bin/*
      - name: Cargo format
        run: cargo fmt --all -- --check
      - name: Cargo test
        run: cargo test --workspace --all-targets --locked
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  windows:
    name: Windows · Installer and Rust
    needs: materialize
    runs-on: windows-latest
    steps:
      - name: Checkout materialized commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.materialize.outputs.commit_sha }}
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Validate cut contract
        shell: pwsh
        run: python ci/validate_cut.py
      - name: Cargo format
        run: cargo fmt --all -- --check
      - name: Cargo test
        run: cargo test --workspace --all-targets --locked
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Validate installer contracts
        shell: pwsh
        run: ./installer/build.ps1 -TestRebootContractOnly
